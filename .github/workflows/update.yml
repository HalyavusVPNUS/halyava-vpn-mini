name: Mini VPN Update

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run script
        env:
          GH_USER: ${{ secrets.GH_USER }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_TOKEN6: ${{ secrets.GH_TOKEN6 }}
        run: python main.py
